name: Copilot Auto-Merge

on:
  pull_request_review:
    types: [ submitted ]

concurrency:
  group: copilot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    if: |
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' &&
      github.event.review.user.type == 'Bot' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.review.commit_id == github.event.pull_request.head.sha

    steps:
      - name: Count inline comments on this review
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          REVIEW_ID: ${{ github.event.review.id }}
        run: |
          n=$(gh api --paginate --slurp "repos/${REPO}/pulls/${PR}/reviews/${REVIEW_ID}/comments?per_page=100" --jq 'map(length) | add // 0')
          echo "count=${n}" >> "$GITHUB_OUTPUT"
          if [ "$n" -eq 0 ]; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        id: enable-auto-merge
        if: steps.count.outputs.clean == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --auto --merge

      - name: Disable auto-merge
        id: disable-auto-merge
        if: steps.count.outputs.clean == 'false'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --disable-auto

      - name: Upsert status comment
        uses: actions/github-script@v9.0.0
        env:
          INLINE_COUNT: ${{ steps.count.outputs.count }}
          CLEAN: ${{ steps.count.outputs.clean }}
          REVIEW_SHA: ${{ github.event.review.commit_id }}
          MERGE_OUTCOME: ${{ steps.enable-auto-merge.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const count = process.env.INLINE_COUNT;
            const clean = process.env.CLEAN === 'true';
            const sha = (process.env.REVIEW_SHA || '').slice(0, 7);
            const mergeOutcome = process.env.MERGE_OUTCOME;

            let verdict;
            if (!clean) {
              verdict = `:speech_balloon: Latest review on \`${sha}\` left **${count}** inline comment(s). Auto-merge not armed yet — push fixes and resolve threads.`;
            } else if (mergeOutcome === 'success') {
              verdict = `:white_check_mark: Latest review on \`${sha}\` left **no inline comments**. Auto-merge armed.`;
            } else {
              verdict = `:white_check_mark: Latest review on \`${sha}\` left **no inline comments**, but auto-merge could not be enabled — check repo settings or permissions.`;
            }

            const header = '🤖 **Copilot review status**';
            const fullBody = [header, verdict, '', 'Merge still gated by branch protection: required checks and conversation resolution.'].join('\n\n');

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const prior = existing.find(c => c.user.id === 41898282 && c.body.startsWith(header));

            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
