name: Update Lockfile
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: update-lockfile
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH for private repositories
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Checkout main repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@v28
        id: update-flake-lock
        with:
          commit-msg: "🧹 chore(flake.lock): update"
          pr-body: |
            ```
            {{ env.GIT_COMMIT_MESSAGE }}
            ```
          pr-title: "🧹 chore(flake.lock): update"
          pr-labels: auto-merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit message for compare URLs
        if: steps.update-flake-lock.outputs.pull-request-operation == 'created' || steps.update-flake-lock.outputs.pull-request-operation == 'updated'
        id: get-commit-message
        env:
          PR_NUMBER: ${{ steps.update-flake-lock.outputs.pull-request-number }}
        run: |
          PR_BRANCH="update_flake_lock_action"
          git fetch origin "${PR_BRANCH}:${PR_BRANCH}" || git fetch origin

          COMMIT_MSG=$(git log --format=%B -n 1 "${PR_BRANCH}" 2>/dev/null || git log --format=%B -n 1 HEAD)
          {
            echo "commit-message<<EOF"
            echo "$COMMIT_MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "pr-branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Create compare URLs
        uses: actions/github-script@v8
        if: steps.update-flake-lock.outputs.pull-request-operation == 'created' || steps.update-flake-lock.outputs.pull-request-operation == 'updated'
        env:
          GIT_COMMIT_MESSAGE: ${{ steps.get-commit-message.outputs.commit-message }}
          PULL_REQUEST_NUMBER: ${{ steps.update-flake-lock.outputs.pull-request-number }}
          PR_BRANCH: ${{ steps.get-commit-message.outputs.pr-branch }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = require('.github/scripts/comment')
            const compare = require('.github/scripts/compare')

            const urls = await compare({ core })
            if (!urls?.length) {
              core.info('No compare URLs to add')
              return
            }

            const header = "## 🔗 Compare URLs"
            const body = urls.map((url) => `- ${url}`).join("\n")

            const issueNumber = parseInt(process.env.PULL_REQUEST_NUMBER, 10)
            if (Number.isNaN(issueNumber)) {
              core.error('Could not determine PR number')
              return
            }

            core.info(`Adding compare URLs to PR #${issueNumber}`)
            await comment({ github, context, header, body, issueNumber })

      - name: Wait for required checks before auto-merge
        if: ${{ steps.update-flake-lock.outputs.pull-request-url != '' }}
        env:
          PR_NUMBER: ${{ steps.update-flake-lock.outputs.pull-request-number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER}" ]; then
            {
              echo "### Warning: Check gate skipped"
              echo
              echo "No PR number was provided by update-flake-lock."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          timeout_at=$(( $(date +%s) + 3600 ))

          echo "Waiting for required checks on PR #${PR_NUMBER} (${PR_SHA})..."

          while true; do
            now=$(date +%s)
            if [ "$now" -ge "$timeout_at" ]; then
              echo "Timed out waiting for required checks." >&2
              exit 1
            fi

            checks_json=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${PR_SHA}/check-runs")

            flake_conclusion=$(echo "$checks_json" | jq -r '[.check_runs[] | select(.name == "flake-check") | .conclusion] | last // ""')
            discover_conclusion=$(echo "$checks_json" | jq -r '[.check_runs[] | select(.name == "discover-hosts") | .conclusion] | last // ""')
            validate_total=$(echo "$checks_json" | jq '[.check_runs[] | select(.name | startswith("validate ("))] | length')
            validate_pending=$(echo "$checks_json" | jq '[.check_runs[] | select(.name | startswith("validate (")) | select(.status != "completed" or .conclusion == null)] | length')
            validate_failed=$(echo "$checks_json" | jq '[.check_runs[] | select(.name | startswith("validate (")) | select(.status == "completed" and .conclusion != "success")] | length')

            echo "flake-check=${flake_conclusion:-pending}, discover-hosts=${discover_conclusion:-pending}, validate jobs=${validate_total}, validate pending=${validate_pending}, validate failed=${validate_failed}"

            if [ "$flake_conclusion" = "success" ] \
              && [ "$discover_conclusion" = "success" ] \
              && [ "$validate_total" -gt 0 ] \
              && [ "$validate_pending" -eq 0 ] \
              && [ "$validate_failed" -eq 0 ]; then
              {
                echo "### ✅ Required checks passed"
                echo
                echo "- Flake Check: success"
                echo "- Configuration Validation: success for all hosts"
              } >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            if [ "$flake_conclusion" = "failure" ] || [ "$flake_conclusion" = "cancelled" ] || [ "$flake_conclusion" = "timed_out" ] || [ "$flake_conclusion" = "action_required" ] || [ "$flake_conclusion" = "startup_failure" ] || [ "$flake_conclusion" = "stale" ]; then
              echo "Flake Check did not succeed (conclusion: $flake_conclusion)." >&2
              exit 1
            fi

            if [ "$discover_conclusion" = "failure" ] || [ "$discover_conclusion" = "cancelled" ] || [ "$discover_conclusion" = "timed_out" ] || [ "$discover_conclusion" = "action_required" ] || [ "$discover_conclusion" = "startup_failure" ] || [ "$discover_conclusion" = "stale" ]; then
              echo "Configuration Validation discovery did not succeed (conclusion: $discover_conclusion)." >&2
              exit 1
            fi

            if [ "$validate_failed" -gt 0 ]; then
              echo "One or more host validation jobs failed." >&2
              exit 1
            fi

            sleep 30
          done

      - name: Auto-merge GitHub bot PRs
        if: ${{ steps.update-flake-lock.outputs.pull-request-url != '' }}
        run: |
          if [ -n "$PR_URL" ]; then
            gh pr merge --auto --merge "$PR_URL"
          else
            {
              echo "### Warning: Auto-merge skipped"
              echo
              echo "The update-flake-lock step reported a pull-request URL, but PR_URL was empty when attempting to auto-merge."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          PR_URL: ${{ steps.update-flake-lock.outputs.pull-request-url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
